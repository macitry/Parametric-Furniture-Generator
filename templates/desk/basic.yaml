# Basic Desk Template
#
# A standard four-leg work desk with:
# - 4 aluminum profile legs
# - 4 aluminum profile beams (front, back, left, right)
# - 1 tabletop board
#
# This template is DECLARATIVE: it describes only WHAT parts exist
# and HOW they connect. Dimensions come from user Parameters.
# Positions are computed by the Solver.

name: "Basic Desk"
type: desk

parts:
  # ---- Legs ----
  - name: leg_front_left
    part_type: leg
    profile: "3030"
    material: aluminum

  - name: leg_front_right
    part_type: leg
    profile: "3030"
    material: aluminum

  - name: leg_back_left
    part_type: leg
    profile: "3030"
    material: aluminum

  - name: leg_back_right
    part_type: leg
    profile: "3030"
    material: aluminum

  # ---- Beams ----
  - name: beam_front
    part_type: beam
    profile: "3030"
    material: aluminum

  - name: beam_back
    part_type: beam
    profile: "3030"
    material: aluminum

  - name: beam_left
    part_type: beam
    profile: "3030"
    material: aluminum

  - name: beam_right
    part_type: beam
    profile: "3030"
    material: aluminum

  # ---- Tabletop ----
  - name: tabletop
    part_type: tabletop
    profile: null
    board: plywood
    material: wood

# ---- Topology: how parts connect ----
topology:
  connections:
    # Legs to beams
    - part_a: leg_front_left
      part_b: beam_front
    - part_a: leg_front_left
      part_b: beam_left
    - part_a: leg_front_right
      part_b: beam_front
    - part_a: leg_front_right
      part_b: beam_right
    - part_a: leg_back_left
      part_b: beam_back
    - part_a: leg_back_left
      part_b: beam_left
    - part_a: leg_back_right
      part_b: beam_back
    - part_a: leg_back_right
      part_b: beam_right
    # Tabletop to all legs
    - part_a: tabletop
      part_b: leg_front_left
    - part_a: tabletop
      part_b: leg_front_right
    - part_a: tabletop
      part_b: leg_back_left
    - part_a: tabletop
      part_b: leg_back_right
